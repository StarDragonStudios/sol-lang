name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  repository-checks:
    name: Repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify repository layout
        run: |
          test -f README.md
          test -f LICENSE
          test -f .editorconfig
          test -f spec/sol-0.1.md
          test -d compiler
          test -d runtime-c
          test -d examples
          test -d tests
